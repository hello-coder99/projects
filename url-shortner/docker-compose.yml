version: "3.9"
services:
  redis-server:
    image: redis:7
    container_name: my-redis
    expose:
      - "6379"
    restart: always
  
  nginx-proxy:
    image: nginx:alpine
    container_name: my-nginx
    ports:
      - "80:80"
    restart: always
    volumes:
      - ./rev-nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
  database:
    image: mysql:5.7
    container_name: my-sql
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    restart: always
    volumes:
      - ./maria_db/init.sql:/docker-entrypoint-initdb.d/init.sql
  web:
    build:
      context: web-flask/
    container_name: my-web
    expose:
      - "5000"
    restart: always
    environment:
      REDIS_HOST: redis-server
      MYSQL_HOST: database
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: mydb
    depends_on:
      - database
      - redis-server
